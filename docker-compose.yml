services:
  postgres:
    image: postgres:16
    container_name: crypto-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-crypto_mvp}
      POSTGRES_USER: ${DB_USER:-crypto_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crypto_pass}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crypto_user} -d ${DB_NAME:-crypto_mvp}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: .
    container_name: crypto-backend
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  bot:
    build: .
    container_name: crypto-bot
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m bot.main

volumes:
  pg_data:
